receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    send_batch_size: 1000
    timeout: 5s

  # Add useful resource attributes
  resource:
    attributes:
      - key: deployment.environment
        value: "demo"
        action: upsert

exporters:
  # ── Refinery (traces + logs) — sampling proxy before Honeycomb ─
  otlp/refinery:
    endpoint: "refinery:4317"
    tls:
      insecure: true
    headers:
      "x-honeycomb-team": "${env:HONEYCOMB_API_KEY}"

  # ── Honeycomb traces + logs (direct — used when Refinery is bypassed) ─
  otlp/honeycomb:
    endpoint: "api.honeycomb.io:443"
    headers:
      "x-honeycomb-team": "${env:HONEYCOMB_API_KEY}"

  # ── Honeycomb metrics (requires explicit dataset to avoid Unknown_dataset) ─
  otlp/honeycomb-metrics:
    endpoint: "api.honeycomb.io:443"
    headers:
      "x-honeycomb-team": "${env:HONEYCOMB_API_KEY}"
      "x-honeycomb-dataset": "${env:HONEYCOMB_METRICS_DATASET}"

  # ── Debug exporter (stdout — helpful for verifying locally) ─
  debug:
    verbosity: basic
    sampling_initial: 5
    sampling_thereafter: 20

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]

  pipelines:
    traces:
      receivers:  [otlp]
      processors: [resource, batch]
      exporters:  [otlp/refinery, debug]

    metrics:
      receivers:  [otlp]
      processors: [resource, batch]
      exporters:  [otlp/honeycomb-metrics, debug]

    logs:
      receivers:  [otlp]
      processors: [resource, batch]
      exporters:  [otlp/refinery, debug]

  telemetry:
    logs:
      level: info
